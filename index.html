<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRarchit - مرجع معماری و عمران</title>
    <!-- تلگرام وب اپ -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/vazirmatn-font-face.css');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Vazirmatn', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0d0d0d; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #ffffff; overflow: hidden; }
        
        .phone-container { width: 100%; max-width: 410px; height: 100vh; background: linear-gradient(135deg, #117543 0%, #1c9441 40%, #7ca81e 100%); border-radius: 40px; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-bar { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .close-btn { width: 36px; height: 36px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        
        .app-card { flex: 1; background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(25px); margin: 10px 16px 20px 16px; border-radius: 28px; padding: 24px 20px; display: flex; flex-direction: column; overflow-y: auto; }
        
        .screen { display: none; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }
        
        .question-text { font-size: 16px; font-weight: 700; margin-bottom: 20px; text-align: center; }
        .options-list { display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .option-item { background: rgba(255, 255, 255, 0.08); border: 1.5px solid rgba(255, 255, 255, 0.1); padding: 14px 18px; border-radius: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .option-item.selected { background: rgba(52, 199, 89, 0.3); border-color: #34c759; }
        
        .btn { width: 100%; padding: 14px; border-radius: 16px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; margin-top: 20px; background-color: #ffffff; color: #1c9441; }
        .btn:disabled { opacity: 0.5; }

        .terms-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .terms-overlay.hidden { display: none; }
        .terms-popup { background: white; color: black; padding: 20px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="top-bar">
            <div class="close-btn" onclick="window.Telegram.WebApp.close()">✕</div>
        </div>

        <div class="terms-overlay" id="termsOverlay">
            <div class="terms-popup">
                <h3>شرایط عضویت</h3>
                <p style="margin: 15px 0;">تایید هویت برای امنیت گروه الزامی است.</p>
                <button class="btn" style="background: #007aff; color: white;" onclick="acceptTerms()">متوجه شدم</button>
            </div>
        </div>

        <div class="app-card">
            <!-- سوال ۱ -->
            <div class="screen active" id="screen1">
                <div class="question-text">وضعیت تحصیلی شما؟</div>
                <div class="options-list">
                    <div class="option-item" onclick="selectSingle(this, 'q1')"><span>دانشجو</span></div>
                    <div class="option-item" onclick="selectSingle(this, 'q1')"><span>فارغ‌التحصیل</span></div>
                </div>
                <button class="btn" id="btn1" disabled onclick="go(2)">مرحله بعد</button>
            </div>

            <!-- سوال ۲ -->
            <div class="screen" id="screen2">
                <div class="question-text">از کجا با ما آشنا شدید؟</div>
                <div class="options-list">
                    <div class="option-item" onclick="selectSingle(this, 'q2')"><span>اینستاگرام</span></div>
                    <div class="option-item" onclick="selectSingle(this, 'q2')"><span>دوستان</span></div>
                </div>
                <button class="btn" id="btn2" disabled onclick="go(3)">مرحله بعد</button>
            </div>

            <!-- سوال ۳ -->
            <div class="screen" id="screen3">
                <div class="question-text">علایق شما؟</div>
                <div class="options-list">
                    <div class="option-item" onclick="selectMulti(this)"><span>کافه معماری</span></div>
                    <div class="option-item" onclick="selectMulti(this)"><span>فرصت شغلی</span></div>
                </div>
                <button class="btn" id="btn3" disabled onclick="submit()">ثبت نهایی</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let finalData = { q1: "", q2: "", q3: [] };

        function acceptTerms() {
            document.getElementById('termsOverlay').classList.add('hidden');
        }

        function selectSingle(el, q) {
            el.parentElement.querySelectorAll('.option-item').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            finalData[q] = el.innerText;
            document.getElementById(q === 'q1' ? 'btn1' : 'btn2').disabled = false;
        }

        function selectMulti(el) {
            const val = el.innerText;
            if (el.classList.contains('selected')) {
                el.classList.remove('selected');
                finalData.q3 = finalData.q3.filter(i => i !== val);
            } else {
                el.classList.add('selected');
                finalData.q3.push(val);
            }
            document.getElementById('btn3').disabled = finalData.q3.length === 0;
        }

        function go(num) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen' + num).classList.add('active');
        }

        function submit() {
            try {
                // ارسال به تلگرام
                const dataString = JSON.stringify(finalData);
                tg.sendData(dataString);
                
                // بازخورد به کاربر
                tg.HapticFeedback.notificationOccurred('success');
                
                // بستن بعد از اتمام (اختیاری: می‌توانی alert بگذاری که "ارسال شد")
                // tg.close(); 
            } catch (e) {
                alert("خطا در ارسال: " + e.message);
            }
        }
    </script>
</body>
</html>
